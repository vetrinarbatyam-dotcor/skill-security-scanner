services:
  skill-scanner:
    build: .
    container_name: skill-scanner
    restart: unless-stopped
    ports:
      - "8990:8990"
    environment:
      - PYTHONUNBUFFERED=1
    mem_limit: 512m
    cpus: 1.0
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
